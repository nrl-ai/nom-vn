name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint + format + types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Stub ui_dist (real bundle is built in ui-build / publish jobs)
        run: |
          mkdir -p src/nom/chat/ui_dist
          echo '<!doctype html><meta charset="utf-8"><title>nom-vn UI placeholder</title>' \
            > src/nom/chat/ui_dist/index.html

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy src/

  test:
    name: test · py${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Stub ui_dist (real bundle is built in ui-build / publish jobs)
        run: |
          mkdir -p src/nom/chat/ui_dist
          echo '<!doctype html><meta charset="utf-8"><title>nom-vn UI placeholder</title>' \
            > src/nom/chat/ui_dist/index.html

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ --cov=nom --cov-report=term-missing

  benchmark:
    name: benchmark smoke (perf + accuracy)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Stub ui_dist (real bundle is built in ui-build / publish jobs)
        run: |
          mkdir -p src/nom/chat/ui_dist
          echo '<!doctype html><meta charset="utf-8"><title>nom-vn UI placeholder</title>' \
            > src/nom/chat/ui_dist/index.html

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Perf benchmark (smoke)
        run: python benchmarks/perf/bench_text.py

      - name: Accuracy benchmark (smoke)
        run: python benchmarks/accuracy/bench_diacritics.py

  ui-build:
    name: ui · pnpm build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: pnpm install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: TypeScript check (no emit)
        run: pnpm lint

      - name: Vite build
        run: pnpm build

      - name: Verify dist output
        run: |
          test -f dist/index.html
          test -d dist/assets
          ls -la dist/

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/
          retention-days: 7
